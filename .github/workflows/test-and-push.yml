name: Test and Auto-Push to Develop

on:
  push:
    # Ignora as branches de produção, homologação e a própria develop 
    # (ignorar a develop é crucial para não criar um loop infinito de execuções)
    branches-ignore:
      - main
      - homolog
      - develop 

# Necessário para que o bot do GitHub consiga dar o push no repositório
permissions:
  contents: write

jobs:
  test-and-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Baixa o histórico completo, necessário para o merge entre branches

      - name: Configurar o .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Ajuste para a versão do seu projeto (ex: 6.0.x, 7.0.x)

      - name: Restaurar dependências
        run: dotnet restore

      - name: Compilar o projeto (Build)
        run: dotnet build --no-restore --configuration Release

      - name: Executar Testes Unitários
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Merge e Push para a develop
        # Esta etapa só roda se as etapas anteriores (build e test) não falharem
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Traz as atualizações mais recentes da develop
          git fetch origin develop
          git checkout develop

          # Faz o merge da branch que disparou o push (sua feature branch) para dentro da develop
          git merge origin/${{ github.ref_name }} --no-edit

          # Envia as alterações para o repositório remoto
          git push origin develop